<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TinyNode Monitor</title>
    <link rel="stylesheet" href="static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>TinyNode Monitor</h1>
        
        <div class="grid">
            <div class="card">
                <h3>System Status</h3>
                <div class="value" id="current-cpu">CPU: --%</div>
                <div class="value" id="current-ram">RAM: -- / -- MB</div>
                <div class="uptime-text" id="current-uptime">Uptime: --</div>
            </div>
            
            <div class="card">
                <h3>Network Traffic</h3>
                <div class="value text-success" id="net-rx">⬇️ -- KB/s</div>
                <div class="value text-info" id="net-tx">⬆️ -- KB/s</div>
            </div>
            
            <div class="card" style="flex: 1.5;">
                <h3>Top Processes (CPU)</h3>
                <ul class="process-list" id="top-processes">
                    <li>Loading data...</li>
                </ul>
            </div>
        </div>

        <div class="card mb-20">
            <h3>Disk Storage</h3>
            <div id="disk-list">
                <div class="text-muted">Scanning disks...</div>
            </div>
        </div>

        <div class="chart-card">
            <canvas id="metricsChart"></canvas>
        </div>
    </div>

    <script src="static/app.js"></script>
</body>
</html>
